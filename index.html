<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonalHub — Your Life Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Clerk publishable key — replaced at build time by build.js -->
    <script>window.APP_CONFIG = { clerkKey: '__CLERK_PUBLISHABLE_KEY__' };</script>
    <script src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-64 flex-shrink-0 flex flex-col">
        <div class="px-6 py-5">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-400 rounded-xl flex items-center justify-center font-bold text-white text-lg">P</div>
                <div>
                    <div class="text-white font-bold text-base leading-tight">PersonalHub</div>
                    <div class="text-indigo-300 text-xs">Life Dashboard</div>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-3 py-2 overflow-y-auto">
            <div class="nav-section-label">Overview</div>
            <button class="nav-item active" data-view="dashboard">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </button>

            <div class="nav-section-label">Scheduling</div>
            <button class="nav-item" data-view="schedule">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Calendar
            </button>
            <button class="nav-item" data-view="tasks">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                Tasks
            </button>
            <button class="nav-item" data-view="client-bookings">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Client Bookings
            </button>

            <div class="nav-section-label">Finances</div>
            <button class="nav-item" data-view="personal-expenses">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                Personal Expenses
            </button>
            <button class="nav-item" data-view="professional-expenses">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Business Expenses
            </button>
            <button class="nav-item" data-view="revenue">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Revenue
            </button>
            <button class="nav-item" data-view="pnl">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                P&amp;L Calculator
            </button>
            <button class="nav-item" data-view="bank-statement">
                <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Bank Statement
            </button>
        </nav>

        <div class="px-4 py-4 border-t border-indigo-700/50">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-500 rounded-full flex items-center justify-center font-semibold text-white text-sm flex-shrink-0" id="user-avatar">S</div>
                <div class="flex-1 min-w-0">
                    <div class="text-white text-sm font-medium truncate" id="user-name-display">Srinivasan</div>
                    <div class="text-indigo-300 text-xs">Personal Account</div>
                </div>
                <button onclick="Auth.signOut()" title="Sign out" id="signout-btn"
                    class="hidden w-7 h-7 rounded-lg flex items-center justify-center transition-colors flex-shrink-0"
                    style="background:rgba(255,255,255,0.08)">
                    <svg style="width:0.9rem;height:0.9rem;color:#a5b4fc" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
            <div>
                <h1 id="page-title" class="text-xl font-bold text-gray-800">Dashboard</h1>
                <p id="page-subtitle" class="text-sm text-gray-500 mt-0.5"></p>
            </div>
            <div class="flex items-center gap-3">
                <span id="current-date" class="text-sm text-gray-500"></span>
                <button id="quick-add-btn" onclick="App.openQuickAdd()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Quick Add
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6" id="view-container"></main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4" onclick="App.closeModal(event)">
        <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        </div>
    </div>

    <!-- Auth Gate — shown when Clerk is configured and user is not signed in -->
    <div id="auth-gate" class="hidden fixed inset-0 flex items-center justify-center" style="background:linear-gradient(135deg,#1e1b4b 0%,#312e81 45%,#4338ca 100%);z-index:9999">
        <div class="w-full max-w-sm px-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center font-bold text-white text-3xl mx-auto mb-4" style="background:rgba(255,255,255,0.15);backdrop-filter:blur(8px)">P</div>
                <h1 class="text-3xl font-bold text-white">PersonalHub</h1>
                <p class="text-indigo-300 mt-2 text-sm">Sign in to access your dashboard</p>
            </div>
            <div id="clerk-sign-in" class="rounded-2xl overflow-hidden shadow-2xl"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js"></script>
    <!-- Google Calendar Integration -->
    <script async defer src="https://apis.google.com/js/api.js" onload="GCal.onGapiLoad()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="GCal.onGisLoad()"></script>
</body>
</html>
